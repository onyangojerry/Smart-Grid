services:
  postgres:
    image: postgres:16
    container_name: energyallocation-postgres
    environment:
      POSTGRES_DB: energyallocation
      POSTGRES_USER: energyallocation
      POSTGRES_PASSWORD: energyallocation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energyallocation -d energyallocation"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
      

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energyallocation-api
    env_file:
      - .env.example
    environment:
      EA_SERVICE_KEYS: "ops-key:svc_ops:ops_admin:,ml-key:svc_ml:ml_engineer:"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    image: node:20-alpine
    container_name: energyallocation-ui
    working_dir: /app/ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

  modbus-sim:
    build:
      context: .
      dockerfile: Dockerfile.edge
    container_name: energyallocation-modbus-sim
    command: ["energy-edge-sim"]
    environment:
      EDGE_SIM_MODBUS_HOST: 0.0.0.0
      EDGE_SIM_MODBUS_PORT: 15020
    ports:
      - "15020:15020"

  edge-runtime:
    build:
      context: .
      dockerfile: Dockerfile.edge
    container_name: energyallocation-edge
    env_file:
      - .env.example
    environment:
      EDGE_RUNTIME_MODE: service
      EDGE_SITE_ID: site_001
      EDGE_GATEWAY_ID: gw_edge_01
      EDGE_DEVICE_PROFILE: simulated_home_bess
      EDGE_PROFILE_REGISTER_MAP_PATH:
      EDGE_DEVICE_ENABLED: true
      EDGE_READ_ONLY_MODE: false
      EDGE_OBSERVATION_ONLY_MODE: false
      EDGE_SQLITE_PATH: /app/data/edge/edge_runtime.db
      EDGE_STATUS_FILE: /app/data/edge/status.json
      EA_API_BASE_URL: http://api:8000
      EDGE_API_BEARER_TOKEN: ${EDGE_API_BEARER_TOKEN:-}
      EDGE_API_KEY: ${EDGE_API_KEY:-ops-key}
      EDGE_MODBUS_HOST: modbus-sim
      EDGE_MODBUS_PORT: 15020
      EDGE_ALLOW_PROFILE_UNIT_ID_OVERRIDE: false
      EDGE_POLL_INTERVAL_SECONDS: 5
      EDGE_COMMAND_INTERVAL_SECONDS: 5
      EDGE_STATUS_INTERVAL_SECONDS: 10
    volumes:
      - edge_data:/app/data/edge
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      modbus-sim:
        condition: service_started

volumes:
  postgres_data:
  edge_data:
